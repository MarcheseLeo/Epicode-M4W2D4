<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!------- Bootstrap cdn ------->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <!------- Font awesome ------->
    <script src="https://kit.fontawesome.com/49727d7509.js" crossorigin="anonymous"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet"> <!------- Style ------->
    <link rel="stylesheet" href="./assets/css/style.css">

</head>

<body>

    <div class="app-container">

        <!------- Sidebar ------->
        <aside class="sidebar-cart p-4">
            <div class="d-flex align-items-center mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="var(--accent-color)"
                    class="bi bi-cart3 me-2" viewBox="0 0 16 16">
                    <path
                        d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .49.598l-1 5a.5.5 0 0 1-.465.401l-9.397.472L4.415 11H13a.5.5 0 0 1 0 1H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5zM3.102 4l.84 4.479 9.144-.459L13.89 4H3.102zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2z" />
                </svg>
                <h3 class="m-0 fs-4 serif-font">Il tuo Carrello</h3>
            </div>

            <div id="cart-items-container" class="cart-items-container flex-grow-1 overflow-auto pe-2">
                <p class="text-muted text-center pt-5">Il carrello è vuoto.</p>
            </div>

            <div class="mt-auto pt-3 border-top border-dark">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="fs-5 fw-bold serif-font">Totale:</span>
                    <span id="cart-total" class="fs-4 fw-bold text-dark serif-font text-nowrap">€ 0.00</span>
                </div>
                <button class="btn btn-add w-100 py-2 fs-6">Procedi al Checkout</button>
            </div>
        </aside>

        <!------- Main ------->
        <main class="flex-grow-1 p-4 pb-5">

            <!------- Topbar ------->
            <header class="topbar d-flex justify-content-end align-items-center pb-4 mb-4">
                <div class="d-flex align-items-center gap-4">
                    <input type="text" class="search-bar form-control" placeholder="Cerca libri..." oninput="search(this)">
                    <div class="user-avatar">MS</div>
                </div>
            </header>

            <div class="d-flex justify-content-between align-items-end mb-4">
                <div>
                    <h1 class="mb-1 serif-font fs-1">Esplora i Libri</h1>
                    <p class="text-muted mb-0">Aggiungi i tuoi preferiti al carrello</p>
                </div>
                <button class="btn btn-sm btn-outline-secondary">↓ Ordina per: Novità</button>
            </div>

            <!------- Books container ------->
            <div class="row row-cols-1 row-cols-lg-2 row-cols-xl-3 g-4" id="bookCardsContainer">

            </div>
        </main>

    </div>
    <!------- Bootsrap js ------->
    <script src="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/script.js"></script>
</body>

</html>
